####################################################################################
# Kubernetes SRE Self-Healing Loop Engine — GitHub Actions entrypoint
#
# Required repository secrets:
#   AZURE_CREDENTIALS   JSON for azure/login (SP with AKS read+ Contributor as needed)
#   AKS_RESOURCE_GROUP  Resource group holding the AKS cluster
#   AKS_CLUSTER_NAME    AKS cluster name
#   SLACK_WEBHOOK_URL   Incoming webhook (or MCP endpoint) for notifications
#   GH_DISPATCH_PAT     PAT used by in-cluster lifecycle hooks (repository_dispatch)
#
# Triggers:
#   - workflow_dispatch     : manual / operator-initiated (supports 'chat' mode)
#   - repository_dispatch   : fired by in-cluster lifecycle hooks (Skill #7)
####################################################################################
name: sre-loop

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Execution mode"
        type: choice
        required: true
        default: review
        options: [review, auto, chat]
      namespace:
        description: "Target namespace (empty = all)"
        type: string
        required: false
        default: ""
      target:
        description: "Optional deployment/pod name to scope the run"
        type: string
        required: false
        default: ""
      max_iterations:
        description: "Convergence retry limit"
        type: string
        required: false
        default: "3"
  repository_dispatch:
    types: [aks-deployment-success, aks-deployment-failure, sre-loop-trigger]

concurrency:
  # Serialize per-namespace so two loops never remediate the same target at once.
  group: sre-loop-${{ github.event.inputs.namespace || github.event.client_payload.namespace || 'cluster' }}
  cancel-in-progress: false

permissions:
  contents: write        # to commit iteration memory
  actions: read
  id-token: write        # OIDC for azure/login (preferred over static creds)

jobs:
  sre-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Normalize inputs across workflow_dispatch and repository_dispatch payloads.
      MODE: ${{ github.event.inputs.mode || github.event.client_payload.mode || 'review' }}
      NAMESPACE: ${{ github.event.inputs.namespace || github.event.client_payload.namespace || '' }}
      TARGET: ${{ github.event.inputs.target || github.event.client_payload.deployment || '' }}
      MAX_ITERATIONS: ${{ github.event.inputs.max_iterations || '3' }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- Skill #2: Dependencies & Tooling Verification (pre-flight) ----------
      - name: Install tooling
        run: |
          set -euo pipefail
          az version >/dev/null 2>&1 || echo "az provided by runner"
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          curl -sfL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ secrets.AKS_RESOURCE_GROUP }}" \
            --name "${{ secrets.AKS_CLUSTER_NAME }}" \
            --overwrite-existing

      - name: Pre-flight verification (Skill #2)
        run: ./scripts/preflight.sh

      # --- The agentic loop (Skills #1,3,4,5,6) --------------------------------
      # The orchestrator script implements the state machine described in
      # skills/1-loop-orchestrator.md. It shells out to the diagnostic and
      # remediation scripts and reads/writes memory/ between iterations.
      - name: Run SRE loop (Skill #1 Orchestrator)
        id: loop
        run: ./scripts/orchestrator.sh
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}

      # --- Skill #6: persist memory across runs --------------------------------
      - name: Commit iteration memory
        if: always()
        run: |
          set -euo pipefail
          git config user.name  "sre-loop-bot"
          git config user.email "sre-loop-bot@users.noreply.github.com"
          git add memory/ || true
          git commit -m "chore(sre-loop): persist iteration memory [skip ci]" || echo "no memory changes"
          git push || echo "push skipped"

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sre-loop-diagnostics-${{ github.run_id }}
          path: |
            memory/
            /tmp/sre-diagnostics/
          if-no-files-found: ignore
